<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07070d" />
  <title>Bíbliaflix Profissional</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button class="brand" data-go="home" aria-label="Ir para início">
        <span class="brandMark">✝</span>
        <span class="brandName">Bíbliaflix</span>
      </button>

      <div class="searchWrap">
        <span>🔎</span>
        <input id="searchInput" type="search" placeholder="Buscar livro, história, personagem ou referência..." autocomplete="off" />
      </div>

      <div class="topActions">
        <select id="versionSelect" class="versionSelect" title="Versão bíblica">
          <option value="jfaa">Almeida Atualizada</option>
          <option value="acf">ACF</option>
          <option value="ara">ARA</option>
          <option value="blivre">Bíblia Livre</option>
          <option value="tb">Tradução Brasileira</option>
          <option value="nvi">NVI</option>
          <option value="almeida">Almeida antiga</option>
        </select>
        <button id="apiTokenBtn" class="iconBtn" title="Limpar cache bíblico">🧹</button>
        <button id="themeBtn" class="iconBtn" title="Modo claro/escuro">🌙</button>
        <button id="fontMinus" class="iconBtn" title="Diminuir fonte">A-</button>
        <button id="fontPlus" class="iconBtn" title="Aumentar fonte">A+</button>
      </div>
    </header>

    <main id="main" class="main"></main>

    <nav class="bottomNav" aria-label="Navegação principal">
      <button class="navBtn isActive" data-go="home">Início</button>
      <button class="navBtn" data-go="continue">Continuar</button>
      <button class="navBtn" data-go="books">Livros</button>
      <button class="navBtn" data-go="stories">Histórias</button>
      <button class="navBtn" data-go="characters">Personagens</button>
    </nav>
  </div>

  <div id="readerModal" class="modal" aria-hidden="true">
    <section class="readerBox" role="dialog" aria-modal="true">
      <div id="readerCover" class="readerCover">
        <button id="closeReader" class="closeBtn" aria-label="Fechar">×</button>
        <div class="readerCoverShade"></div>
        <div class="readerTitleBlock">
          <span id="readerBadge" class="badge">Leitura</span>
          <h1 id="readerTitle"></h1>
          <p id="readerSub"></p>
        </div>
      </div>

      <div class="readerToolbar">
        <button id="speakBtn" class="pillBtn primary">🔊 Ouvir</button>
        <button id="pauseBtn" class="pillBtn">⏸ Pausar</button>
        <button id="stopBtn" class="pillBtn">⏹ Parar</button>
        <button id="favReaderBtn" class="pillBtn">⭐ Favoritar</button>
        <button id="saveProgressBtn" class="pillBtn">📌 Salvar progresso</button>
        <button id="reloadChapterBtn" class="pillBtn">🔄 Recarregar versão</button>
      </div>

      <article id="readerText" class="readerText"></article>

      <div class="notesBox">
        <label for="notesArea">Minhas anotações</label>
        <textarea id="notesArea" placeholder="Escreva observações, aplicações, dúvidas ou ideias para pregação/EBD..."></textarea>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
